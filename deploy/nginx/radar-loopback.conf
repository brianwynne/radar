# Plain-HTTP origin for an upstream TLS terminator (Cloudflare Tunnel / cloudflared / a proxy).
# Installed to /etc/nginx/conf.d/ only when RADAR is installed with --skip-cert. Listens on the
# loopback only, so it is NOT reachable from the network — the tunnel dials it locally, and TLS is
# handled at the edge. Point your tunnel's origin at http://localhost:8080.
server {
    listen 127.0.0.1:8080;
    server_name _;

    root /opt/radar/apps/web/dist;
    index index.html;

    # Baseline security response headers (the TLS variant radar.conf sets these; the tunnel origin
    # must too, else they're absent unless the edge adds them). CSP is deliberately NOT set here yet —
    # it needs a policy tested against the built SPA; roll it out at the edge in Report-Only first.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # the edge terminated TLS; tell the API it's secure
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
