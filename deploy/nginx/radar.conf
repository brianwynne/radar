# RADAR — TLS front for the web UI + reverse proxy to the API.
# nginx (as its own www-data account) is the only process reachable from the network; the API
# binds 127.0.0.1 and is never exposed directly. Drop your real certificate at
# /etc/radar/tls/{fullchain.pem,privkey.pem} and reload nginx — the installer seeds a
# self-signed pair so HTTPS works out of the box.

# Redirect all plaintext HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    # `listen … http2` form works on nginx 1.24 (Ubuntu 24.04) and 1.25+ alike.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/radar/tls/fullchain.pem;
    ssl_certificate_key /etc/radar/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:RADAR_TLS:10m;
    ssl_session_timeout 1d;

    # Security headers (the app also sets its own via @fastify/helmet on API responses).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    # Static web UI (Vite build). SPA fallback to index.html for client-side routes.
    root /opt/radar/apps/web/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # so the API knows it is behind TLS
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted Vite assets.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
