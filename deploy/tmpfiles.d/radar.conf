# RADAR runtime secrets. The source of truth lives in /etc/radar/secrets (root-only, 0400).
# systemd-tmpfiles copies each secret into a tmpfs at /run/secrets on boot, owned by and
# readable ONLY by the radar service account — so the running service never needs read access
# to /etc/radar/secrets, and the secrets never touch a persistent, world-reachable path.
# (The API resolves all secrets from /run/secrets/* by hard-coded path.)
#
# Type C = copy if the target does not already exist; the tmpfs is wiped on reboot and repopulated.
d /run/secrets 0751 root root -
C /run/secrets/radar_master_key 0400 radar radar - /etc/radar/secrets/radar_master_key
# Optional secrets — only copied if the operator has created the source file:
C /run/secrets/ns1_api_key 0400 radar radar - /etc/radar/secrets/ns1_api_key
C /run/secrets/cloudvision_token 0400 radar radar - /etc/radar/secrets/cloudvision_token
C /run/secrets/prometheus_bearer_token 0400 radar radar - /etc/radar/secrets/prometheus_bearer_token
