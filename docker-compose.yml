# RADAR — container-first, platform-independent stack (ADR-0001).
# radar-web and radar-api are stateless; PostgreSQL is the only durable state.
#
# Status: postgres + radar-migrate + radar-api are runnable; the radar-web build context
# (apps/web) lands in a later increment. This is a DEVELOPMENT topology.
#
# PRODUCTION NOTE: this file exposes the database port on the host for developer
# convenience only. In production, PostgreSQL must NOT be published to the host/public
# network — keep it on the internal compose/overlay network reachable only by
# radar-migrate and radar-api. Credentials here are throwaway development values.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar
    ports:
      # DEVELOPMENT ONLY — do not expose the database in production examples.
      - "5432:5432"
    volumes:
      - radar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot schema migration. Runs to completion before radar-api starts; a single
  # runner (advisory-locked, one retained session) is authoritative, so replicas never
  # migrate concurrently. Exits 0 on success and non-zero on failure. The API never runs
  # migrations itself.
  radar-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://radar:radar@postgres:5432/radar
    command: ["node", "dist/database/migrate.js"]
    restart: "no"

  radar-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      radar-migrate:
        condition: service_completed_successfully
    environment:
      # This is a DEVELOPMENT stack: NODE_ENV=development permits RADAR_DEV_AUTH. The
      # image itself bakes NODE_ENV=production, so production deployments keep dev-auth
      # disabled (the config safety gate refuses to start dev-auth under production).
      NODE_ENV: ${NODE_ENV:-development}
      RADAR_MODE: ${RADAR_MODE:-mock}
      DATABASE_URL: postgres://radar:radar@postgres:5432/radar
      API_PORT: "3000"
      NS1_API_BASE: ${NS1_API_BASE:-https://api.nsone.net/v1/}
      RADAR_DEV_AUTH: ${RADAR_DEV_AUTH:-true}
      # Must be one of NOC_VIEWER | VIEWING_ENGINEER | ENGINEER (config validation is
      # case-sensitive); default to the least-privilege role.
      RADAR_DEV_ROLE: ${RADAR_DEV_ROLE:-NOC_VIEWER}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    secrets:
      - ns1_api_key
    read_only: true
    tmpfs:
      - /tmp
    user: "10001:10001"
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  radar-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - radar-api
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true

  # Dev-only fixture-backed NS1 stand-in (profile: mock).
  mock-ns1:
    build:
      context: .
      dockerfile: apps/mock-ns1/Dockerfile
    profiles: ["mock"]
    ports:
      - "8090:8090"

volumes:
  radar_pgdata:

secrets:
  ns1_api_key:
    file: ./secrets/ns1_api_key.txt
