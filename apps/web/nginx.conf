# radar-web nginx: serve the SPA and proxy /api to radar-api. The NS1 key never reaches
# the browser — it lives only in radar-api behind this proxy.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed build assets.
  location /assets/ {
    expires 1h;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Read-only API — proxied to radar-api on the internal compose network.
  location /api/ {
    proxy_pass http://radar-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA fallback — client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
